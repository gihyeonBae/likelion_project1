<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 | Libre Cafe</title>
    <link rel="stylesheet" href="/src/shared/styles/reset.css" />
    <link rel="stylesheet" href="/src/shared/styles/base.css" />
    <link rel="stylesheet" href="/src/shared/styles/layout.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <main class="section">
      <form class="panel-form" id="signup-form">
        <p class="eyebrow">Sign up</p>
        <h1>회원가입</h1>
        <label class="form-field">
          <span>이름</span>
          <input type="text" name="name" placeholder="홍길동" required />
        </label>
        <label class="form-field">
          <span>이메일</span>
          <input type="email" name="email" placeholder="cafe@example.com" required />
        </label>
        <label class="form-field">
          <span>비밀번호</span>
          <input type="password" name="password" minlength="4" required />
        </label>
        <label class="form-field">
          <span>연락처</span>
          <input type="tel" name="phone" placeholder="010-0000-0000" required />
        </label>
        <p class="form-error" id="form-error" role="alert"></p>
        <div class="detail-actions">
          <button class="button button--primary" type="submit">가입하기</button>
          <a class="button button--ghost" href="/src/customer/account/create/login/index.html">로그인</a>
        </div>
      </form>
    </main>
    <div id="app-footer"></div>
    <script type="module" src="/src/customer/account/create/signup/index.js"></script>
  </body>
</html>
