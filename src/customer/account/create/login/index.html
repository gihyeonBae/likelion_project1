<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 | Libre Cafe</title>
    <link rel="stylesheet" href="../../../../shared/styles/reset.css" />
    <link rel="stylesheet" href="../../../../shared/styles/base.css" />
    <link rel="stylesheet" href="../../../../shared/styles/layout.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <main class="section">
      <form class="panel-form" id="login-form">
        <p class="eyebrow">Login</p>
        <h1>로그인</h1>
        <label class="form-field">
          <span>이메일</span>
          <input type="email" name="email" required />
        </label>
        <label class="form-field">
          <span>비밀번호</span>
          <input type="password" name="password" required />
        </label>
        <p class="form-error" id="form-error" role="alert"></p>
        <div class="detail-actions">
          <button class="button button--primary" type="submit">로그인</button>
          <a class="button button--ghost" href="../signup/index.html">회원가입</a>
        </div>
      </form>
    </main>
    <div id="app-footer"></div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
