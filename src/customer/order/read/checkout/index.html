<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문서 확인 | Libre Cafe</title>
    <link rel="stylesheet" href="/src/shared/styles/reset.css" />
    <link rel="stylesheet" href="/src/shared/styles/base.css" />
    <link rel="stylesheet" href="/src/shared/styles/layout.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <main>
      <section class="page-hero page-hero--menu">
        <div class="page-hero__content">
          <p class="eyebrow">Checkout</p>
          <h1>주문서 확인</h1>
          <p class="hero__description">장바구니 메뉴와 예상 금액을 확인한 뒤 픽업 정보를 입력합니다.</p>
        </div>
      </section>
      <section class="section">
        <div class="cart-layout">
          <div class="cart-list" id="checkout-items"></div>
          <aside class="cart-summary">
            <p class="eyebrow">Total</p>
            <h2>결제 예정 금액</h2>
            <strong id="checkout-total">0원</strong>
            <a class="button button--primary" id="create-order-link" href="/src/customer/order/create">픽업 정보 입력</a>
            <a class="button button--ghost" href="/src/customer/cart/read">장바구니 수정</a>
          </aside>
        </div>
      </section>
    </main>
    <div id="app-footer"></div>
    <script type="module" src="/src/customer/order/read/checkout/index.js"></script>
  </body>
</html>
