<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고객 홈 | Libre Cafe</title>
    <link rel="stylesheet" href="../../../shared/styles/reset.css" />
    <link rel="stylesheet" href="../../../shared/styles/base.css" />
    <link rel="stylesheet" href="../../../shared/styles/layout.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <main>
      <section class="page-hero page-hero--home">
        <div class="page-hero__content">
          <p class="eyebrow">Libre Cafe</p>
          <h1 id="home-banner-title">오늘 마실 커피와 함께할 디저트를 고르세요</h1>
          <p class="hero__description" id="home-banner-description">커피, 논커피 음료, 디저트, 베이커리까지 픽업 주문에 맞게 가볍고 빠르게 둘러볼 수 있습니다.</p>
          <div class="hero__actions">
            <a class="button button--primary" id="home-banner-link" href="../../../customer/menu/read/list/index.html">메뉴 보러가기</a>
            <a class="button button--ghost" href="../../../customer/menu/read/search/index.html">메뉴 검색</a>
          </div>
        </div>
      </section>

      <section class="section section--compact" id="notice-section">
        <div class="section__header">
          <p class="eyebrow">Notice</p>
          <h2>공지사항</h2>
        </div>
        <div class="order-list" id="home-notices"></div>
      </section>

      <section class="section">
        <div class="section__header section__header--split">
          <div>
            <p class="eyebrow">Categories</p>
            <h2>카테고리 바로가기</h2>
          </div>
          <a class="text-link" href="../../../customer/menu/read/list/index.html">전체 메뉴</a>
        </div>
        <div class="category-grid" id="category-list"></div>
      </section>

      <section class="section section--compact">
        <div class="section__header">
          <p class="eyebrow">Recommended</p>
          <h2>대표 메뉴</h2>
        </div>
        <div class="menu-grid" id="recommended-menu"></div>
      </section>

      <section class="section section--compact">
        <div class="section__header">
          <p class="eyebrow">Seasonal</p>
          <h2>시즌 메뉴</h2>
        </div>
        <div class="menu-grid" id="season-menu"></div>
      </section>
    </main>
    <div id="app-footer"></div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
