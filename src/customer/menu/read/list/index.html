<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메뉴 목록 | gh cafe</title>
    <link rel="stylesheet" href="/src/shared/styles/reset.css" />
    <link rel="stylesheet" href="/src/shared/styles/base.css" />
    <link rel="stylesheet" href="/src/shared/styles/layout.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <main>
      <section class="page-hero page-hero--menu">
        <div class="page-hero__content">
          <p class="eyebrow">Cafe menu</p>
          <h1>커피, 음료, 디저트 메뉴</h1>
          <p class="hero__description">카테고리와 정렬을 바꿔가며 오늘의 픽업 메뉴를 고를 수 있습니다.</p>
          <form class="search-form" action="/src/customer/menu/read/search" method="get">
            <input type="search" name="keyword" placeholder="메뉴명, 태그, 설명 검색" aria-label="메뉴 검색어" />
            <button class="button button--primary" type="submit">검색</button>
          </form>
        </div>
      </section>

      <section class="section">
        <div class="menu-toolbar">
          <nav class="category-tabs" id="category-tabs" aria-label="메뉴 카테고리"></nav>
          <label class="select-field">
            <span>정렬</span>
            <select id="sort-select">
              <option value="recommended">추천순</option>
              <option value="price-low">낮은 가격순</option>
              <option value="price-high">높은 가격순</option>
              <option value="name">이름순</option>
            </select>
          </label>
        </div>
        <div class="result-summary" id="result-summary"></div>
        <div class="menu-grid" id="menu-list"></div>
      </section>
    </main>
    <div id="app-footer"></div>
    <script type="module" src="/src/customer/menu/read/list/index.js"></script>
  </body>
</html>
