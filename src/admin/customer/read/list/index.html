<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고객 관리 | gh cafe Admin</title>
    <link rel="stylesheet" href="/src/shared/styles/reset.css" />
    <link rel="stylesheet" href="/src/shared/styles/base.css" />
    <link rel="stylesheet" href="/src/shared/styles/layout.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <main>
      <section class="page-hero page-hero--menu">
        <div class="page-hero__content">
          <p class="eyebrow">Customers</p>
          <h1>고객 관리</h1>
          <p class="hero__description">가입 고객의 상태와 연락처 정보를 확인합니다.</p>
        </div>
      </section>
      <section class="section">
        <div class="menu-toolbar">
          <label class="select-field">
            <span>상태</span>
            <select id="status-filter">
              <option value="all">전체</option>
              <option value="active">활성</option>
              <option value="blocked">정지</option>
              <option value="withdrawn">탈퇴</option>
            </select>
          </label>
        </div>
        <div class="result-summary" id="customer-summary"></div>
        <div class="order-list" id="customer-list"></div>
      </section>
    </main>
    <div id="app-footer"></div>
    <script type="module" src="/src/admin/customer/read/list/index.js"></script>
  </body>
</html>
