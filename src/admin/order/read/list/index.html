<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문 관리 | Libre Cafe Admin</title>
    <link rel="stylesheet" href="../../../../shared/styles/reset.css" />
    <link rel="stylesheet" href="../../../../shared/styles/base.css" />
    <link rel="stylesheet" href="../../../../shared/styles/layout.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <main>
      <section class="page-hero page-hero--menu">
        <div class="page-hero__content">
          <p class="eyebrow">Admin orders</p>
          <h1>주문 관리</h1>
          <p class="hero__description">온라인 주문과 현장 주문의 상태를 접수부터 완료까지 관리합니다.</p>
          <div class="hero__actions">
            <a class="button button--primary" href="../../create/index.html">현장 주문 등록</a>
            <a class="button button--ghost" href="../../../inventory/read/list/index.html">재고 관리</a>
          </div>
        </div>
      </section>
      <section class="section">
        <div class="menu-toolbar">
          <label class="select-field">
            <span>상태</span>
            <select id="status-filter">
              <option value="all">전체</option>
              <option value="received">주문 접수</option>
              <option value="making">제조중</option>
              <option value="ready">픽업대기</option>
              <option value="complete">완료</option>
              <option value="canceled">취소</option>
            </select>
          </label>
        </div>
        <div class="result-summary" id="order-summary"></div>
        <div class="order-list" id="admin-order-list"></div>
      </section>
    </main>
    <div id="app-footer"></div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
